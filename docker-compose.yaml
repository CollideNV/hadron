services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: hadron-postgres
    environment:
      POSTGRES_DB: hadron
      POSTGRES_USER: hadron
      POSTGRES_PASSWORD: hadron
    ports:
      - "5432:5432"
    volumes:
      # pg18+ lays data out under /var/lib/postgresql/<major>/docker — mount the
      # parent dir, not the old pg16-style /var/lib/postgresql/data.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hadron -d hadron"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: hadron-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
