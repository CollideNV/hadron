server {
    listen 8080;
    server_name _;

    # SPA assets with client-side routing fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # SSE event streams -> gateway (buffering must be off)
    location /api/events/ {
        proxy_pass http://hadron-gateway:8001;
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 24h;
    }

    # Orchestrator mutation routes
    location = /api/pipeline/trigger                 { proxy_pass http://hadron-orchestrator:8002; }
    location ~ ^/api/pipeline/[^/]+/intervene$       { proxy_pass http://hadron-orchestrator:8002; }
    location ~ ^/api/pipeline/[^/]+/resume$          { proxy_pass http://hadron-orchestrator:8002; }
    location ~ ^/api/pipeline/[^/]+/ci-result$       { proxy_pass http://hadron-orchestrator:8002; }
    location ~ ^/api/pipeline/[^/]+/nudge$           { proxy_pass http://hadron-orchestrator:8002; }
    location ~ ^/api/pipeline/[^/]+/release/approve$ { proxy_pass http://hadron-orchestrator:8002; }

    # Everything else under /api/ -> dashboard
    location /api/ {
        proxy_pass http://hadron-controller:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
