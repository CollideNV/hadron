apiVersion: apps/v1
kind: Deployment
metadata:
  name: hadron-frontend
  namespace: hadron
  labels:
    app: hadron-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hadron-frontend
  template:
    metadata:
      labels:
        app: hadron-frontend
    spec:
      containers:
        - name: frontend
          image: hadron-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hadron-frontend
  namespace: hadron
  labels:
    app: hadron-frontend
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: hadron-frontend
