apiVersion: v1
kind: ServiceAccount
metadata:
  name: hadron-dashboard
  namespace: hadron
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hadron-orchestrator
  namespace: hadron
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hadron-job-manager
  namespace: hadron
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hadron-orchestrator-job-manager
  namespace: hadron
subjects:
  - kind: ServiceAccount
    name: hadron-orchestrator
    namespace: hadron
roleRef:
  kind: Role
  name: hadron-job-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hadron-worker
  namespace: hadron
---
# Workers create and manage the per-CR E2E runner Job.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hadron-worker-job-manager
  namespace: hadron
subjects:
  - kind: ServiceAccount
    name: hadron-worker
    namespace: hadron
roleRef:
  kind: Role
  name: hadron-job-manager
  apiGroup: rbac.authorization.k8s.io
