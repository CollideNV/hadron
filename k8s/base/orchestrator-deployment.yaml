apiVersion: apps/v1
kind: Deployment
metadata:
  name: hadron-orchestrator
  namespace: hadron
  labels:
    app: hadron-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hadron-orchestrator
  template:
    metadata:
      labels:
        app: hadron-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: hadron-orchestrator
      containers:
        - name: orchestrator
          image: hadron-controller:latest  # Same image, different entry point
          imagePullPolicy: Never
          command:
            - uvicorn
            - hadron.orchestrator.app:create_app
            - "--factory"
            - "--host=0.0.0.0"
            - "--port=8002"
          ports:
            - containerPort: 8002
              name: http
          envFrom:
            - configMapRef:
                name: hadron-config
          env:
            - name: HADRON_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hadron-secrets
                  key: anthropic-api-key
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hadron-secrets
                  key: github-token
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hadron-orchestrator
  namespace: hadron
  labels:
    app: hadron-orchestrator
spec:
  type: ClusterIP
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
      name: http
  selector:
    app: hadron-orchestrator
