apiVersion: apps/v1
kind: Deployment
metadata:
  name: hadron-gateway
  namespace: hadron
  labels:
    app: hadron-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hadron-gateway
  template:
    metadata:
      labels:
        app: hadron-gateway
    spec:
      containers:
        - name: gateway
          image: hadron-controller:latest  # Same image, different entry point
          imagePullPolicy: Never
          command:
            - uvicorn
            - hadron.gateway.app:create_app
            - "--factory"
            - "--host=0.0.0.0"
            - "--port=8001"
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: hadron-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 8001
            initialDelaySeconds: 3
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hadron-gateway
  namespace: hadron
  labels:
    app: hadron-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: http
  selector:
    app: hadron-gateway
