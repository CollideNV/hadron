apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # Reduce Postgres resources for local dev
  - target:
      kind: StatefulSet
      name: hadron-postgres
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: hadron-postgres
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "256Mi"
                    cpu: "250m"
  # Reduce Redis resources for local dev
  - target:
      kind: Deployment
      name: hadron-redis
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hadron-redis
      spec:
        template:
          spec:
            containers:
              - name: redis
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
                  limits:
                    memory: "128Mi"
                    cpu: "100m"
  # Reduce orchestrator resources for local dev
  - target:
      kind: Deployment
      name: hadron-orchestrator
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hadron-orchestrator
      spec:
        template:
          spec:
            containers:
              - name: orchestrator
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "256Mi"
                    cpu: "250m"
  # Remove KEDA resources (CRDs not installed locally)
  - target:
      kind: ScaledObject
      name: hadron-orchestrator
    patch: |
      $patch: delete
      apiVersion: keda.sh/v1alpha1
      kind: ScaledObject
      metadata:
        name: hadron-orchestrator
  - target:
      kind: TriggerAuthentication
      name: hadron-redis-auth
    patch: |
      $patch: delete
      apiVersion: keda.sh/v1alpha1
      kind: TriggerAuthentication
      metadata:
        name: hadron-redis-auth
